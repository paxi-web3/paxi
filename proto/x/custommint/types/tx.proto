syntax = "proto3";
package x.custommint.types;

import "cosmos/msg/v1/msg.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/paxi-web3/paxi/x/custommint/types";

message ParamsInput {
  string burn_threshold = 1;
  string burn_ratio = 2;
  int64 blocks_per_year = 3;
  string first_year_inflation = 4;
  string second_year_inflation = 5;
  string other_year_inflation = 6;
  string uusdt_authority = 7;
}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  ParamsInput params = 2 [(gogoproto.nullable) = false];
}

message MsgUpdateParamsResponse {}

message MsgMintUUSDT {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  string to_address = 2;
  string amount = 3;
}

message MsgMintUUSDTResponse {}

message MsgBurnUUSDT {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  string from_address = 2;
  string amount = 3;
}

message MsgBurnUUSDTResponse {}

service Msg {
  option (cosmos.msg.v1.service) = true;
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  rpc MintUUSDT(MsgMintUUSDT) returns (MsgMintUUSDTResponse);
  rpc BurnUUSDT(MsgBurnUUSDT) returns (MsgBurnUUSDTResponse);
}
